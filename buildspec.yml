version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 10
    commands:
      - apt-get update
      - apt-get install -y jq
      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-3.3.0.1492-linux.zip
      - unzip ./sonar-scanner-cli-3.3.0.1492-linux.zip
      - export PATH=$PATH:./sonar-scanner-3.3.0.1492-linux/bin/
  pre_build:
    commands:
      - sonar-scanner -D"sonar.organization=sonarkey1s" -D"sonar.projectKey=sonarkey1proj" -D"sonar.sources=." -D"sonar.host.url=https://sonarcloud.io" -D"sonar.login=67a6e6a4e9243224d850ed19d8d5188e11744540"
      - sleep 5
      - curl https://sonarcloud.io/api/qualitygates/project_status?projectKey=sonarkey1proj  > analysis.json
      - cat analysis.json
  build:
    commands:
      - echo Building Project
      - echo Finished Building

cache:
  paths:
    - "node_modules/**/*"
